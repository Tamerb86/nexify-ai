<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .floating { animation: float 3s ease-in-out infinite; }
      .pulsing { animation: pulse 2s ease-in-out infinite; }
      .rotating { animation: rotate 4s linear infinite; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f9ff"/>
  
  <!-- Floating elements -->
  <circle cx="350" cy="50" r="8" fill="#10b981" class="floating" style="animation-delay: 0s"/>
  <circle cx="30" cy="80" r="6" fill="#f59e0b" class="floating" style="animation-delay: 0.5s"/>
  <circle cx="370" cy="200" r="7" fill="#8b5cf6" class="floating" style="animation-delay: 1s"/>
  
  <!-- Main content box -->
  <rect x="80" y="60" width="240" height="180" rx="12" fill="white" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Document lines -->
  <line x1="100" y1="85" x2="280" y2="85" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="105" x2="260" y2="105" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="125" x2="270" y2="125" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="145" x2="250" y2="145" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="165" x2="260" y2="165" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="185" x2="240" y2="185" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Sparkles around content -->
  <g class="pulsing">
    <circle cx="320" cy="100" r="3" fill="#fbbf24"/>
    <circle cx="320" cy="100" r="6" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- AI icon with rotation -->
  <g class="rotating" style="transform-origin: 50px 240px">
    <circle cx="50" cy="240" r="20" fill="url(#grad1)" opacity="0.2"/>
    <circle cx="50" cy="240" r="15" fill="none" stroke="url(#grad1)" stroke-width="2"/>
    <text x="50" y="245" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">AI</text>
  </g>
  
  <!-- Arrow indicating generation -->
  <path d="M 70 240 L 60 240" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>
</svg>

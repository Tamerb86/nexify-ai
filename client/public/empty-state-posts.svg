<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes sway {
        0%, 100% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
      }
      .swaying { animation: sway 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="250" fill="#f8fafc"/>
  
  <!-- Document stack -->
  <g class="swaying" style="transform-origin: 150px 100px">
    <!-- Back document -->
    <rect x="120" y="60" width="60" height="80" rx="4" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
    
    <!-- Middle document -->
    <rect x="110" y="70" width="60" height="80" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    
    <!-- Front document -->
    <rect x="100" y="80" width="60" height="80" rx="4" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
    
    <!-- Document lines -->
    <line x1="108" y1="95" x2="152" y2="95" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="108" y1="105" x2="152" y2="105" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="108" y1="115" x2="145" y2="115" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="108" y1="125" x2="148" y2="125" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="108" y1="135" x2="142" y2="135" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Plus icon -->
  <circle cx="200" cy="120" r="25" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <line x1="200" y1="105" x2="200" y2="135" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="185" y1="120" x2="215" y2="120" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="150" y="190" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">No posts yet</text>
  <text x="150" y="210" font-size="12" fill="#64748b" text-anchor="middle">Create your first post to get started</text>
</svg>
